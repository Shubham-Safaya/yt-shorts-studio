name: YouTube to Shorts

# Two ways to run:
#  1. Actions tab -> "YouTube to Shorts" -> Run workflow -> paste a URL (+ optional clip cutting).
#  2. Add a URL line to videos/queue.txt and push -> every new URL gets processed.
on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL (your own video)"
        required: true
      make_clips:
        description: "Also cut 9:16 clips (slower; downloaded as artifacts)"
        type: boolean
        default: false
  push:
    paths:
      - "videos/queue.txt"

permissions:
  contents: write

jobs:
  shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Prepare YouTube cookies (optional, defeats the bot wall)
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            printf '%s' "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "cookies.txt written"
          else
            echo "No YOUTUBE_COOKIES secret — relying on transcripts/ drops if YouTube blocks the runner."
          fi

      - name: Resolve URLs to process
        id: urls
        run: |
          if [ -n "${{ github.event.inputs.youtube_url }}" ]; then
            echo "${{ github.event.inputs.youtube_url }}" > /tmp/urls.txt
          else
            # On push: queue lines not yet reviewed. Derive id from the URL (no network).
            : > /tmp/urls.txt
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in \#*) continue;; esac
              id=$(printf '%s' "$line" | grep -oP '(?:v=|youtu\.be/|/shorts/|/embed/)\K[A-Za-z0-9_-]{11}' | head -1)
              if [ -z "$id" ] || [ ! -f "reviews/$id.md" ]; then echo "$line" >> /tmp/urls.txt; fi
            done < videos/queue.txt || true
          fi
          echo "count=$(wc -l < /tmp/urls.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat /tmp/urls.txt

      - name: Analyze each video
        if: steps.urls.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAKE_CLIPS: ${{ github.event.inputs.make_clips }}
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "::group::$url"
            bash process_video.sh "$url"
            echo "::endgroup::"
          done < /tmp/urls.txt

      - name: Upload clips (if any)
        if: steps.urls.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: shorts-clips
          path: clips/*.mp4
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit reviews
        if: steps.urls.outputs.count != '0'
        run: |
          git config user.name "Shubham Safaya"
          git config user.email "safayashubham@gmail.com"
          git add reviews/
          if git diff --staged --quiet; then
            echo "No new reviews."
          else
            git commit -m "Shorts plan + review for new video(s)"
            git push
          fi
