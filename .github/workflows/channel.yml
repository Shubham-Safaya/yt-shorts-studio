name: Channel to Shorts (batch)

# Process a whole YouTube channel into Shorts plans. Defaults to @sundayswithsafaya.
# Run it from the Actions tab; it does the most-recent N videos that don't have a plan yet.
# Re-run anytime — it skips videos already in reviews/.
on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "Channel videos URL"
        required: true
        default: "https://www.youtube.com/@sundayswithsafaya/videos"
      max_videos:
        description: "How many recent videos to process this run"
        required: true
        default: "8"
      make_clips:
        description: "Also cut 9:16 clips (slower; downloaded as artifacts)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  channel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: List recent channel videos (skip already-reviewed)
        id: list
        run: |
          N="${{ github.event.inputs.max_videos }}"
          python -m yt_dlp --flat-playlist --print id -I "1:$N" \
            "${{ github.event.inputs.channel_url }}" > /tmp/ids.txt || true
          : > /tmp/urls.txt
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            if [ ! -f "reviews/$id.md" ]; then echo "https://youtu.be/$id" >> /tmp/urls.txt; fi
          done < /tmp/ids.txt
          echo "count=$(wc -l < /tmp/urls.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "To process:"; cat /tmp/urls.txt

      - name: Analyze each video
        if: steps.list.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p reviews clips work
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "::group::$url"
            python -m yt_dlp --skip-download --dump-single-json "$url" > work/meta.json || { echo "meta failed"; continue; }
            id=$(python -c "import json;print(json.load(open('work/meta.json'))['id'])")
            python -m yt_dlp --skip-download --write-auto-subs --write-subs \
              --sub-langs "en.*" --sub-format vtt -o "work/$id.%(ext)s" "$url" || true
            vtt=$(ls work/$id*.vtt 2>/dev/null | head -1); [ -z "$vtt" ] && vtt=/dev/null
            python analyze.py "$vtt" work/meta.json reviews
            if [ "${{ github.event.inputs.make_clips }}" = "true" ] && [ -f "reviews/$id.clips.json" ]; then
              python -m yt_dlp -f "bv*[height<=1080]+ba/b[height<=1080]" -o "work/$id.mp4" "$url" || true
              if [ -f "work/$id.mp4" ]; then
                python clip.py "$id"
              fi
            fi
            echo "::endgroup::"
          done < /tmp/urls.txt

      - name: Upload clips (if any)
        if: steps.list.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: channel-shorts-clips
          path: clips/*.mp4
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit reviews
        if: steps.list.outputs.count != '0'
        run: |
          git config user.name "Shubham Safaya"
          git config user.email "safayashubham@gmail.com"
          git add reviews/
          git diff --staged --quiet || { git commit -m "Channel batch: shorts plans ($(date -u +%F))"; git push; }
