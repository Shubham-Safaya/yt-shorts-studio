name: Channel to Shorts (batch)

# Process a whole YouTube channel into Shorts plans. Defaults to @sundayswithsafaya.
# Run it from the Actions tab; it does the most-recent N videos that don't have a plan yet.
# Re-run anytime — it skips videos already in reviews/.
on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "Channel videos URL"
        required: true
        default: "https://www.youtube.com/@sundayswithsafaya/videos"
      max_videos:
        description: "How many recent videos to process this run"
        required: true
        default: "8"
      make_clips:
        description: "Also cut 9:16 clips (slower; downloaded as artifacts)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  channel:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp + ffmpeg
        run: |
          python -m pip install -U yt-dlp
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Prepare YouTube cookies (optional, defeats the bot wall)
        run: |
          if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            printf '%s' "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "cookies.txt written"
          else
            echo "No YOUTUBE_COOKIES secret — relying on transcripts/ drops if YouTube blocks the runner."
          fi

      - name: List recent channel videos (skip already-reviewed)
        id: list
        run: |
          N="${{ github.event.inputs.max_videos }}"
          COOKIES=""; [ -f cookies.txt ] && COOKIES="--cookies cookies.txt"
          python -m yt_dlp $COOKIES --flat-playlist --print id -I "1:$N" \
            "${{ github.event.inputs.channel_url }}" > /tmp/ids.txt || true
          : > /tmp/urls.txt
          while IFS= read -r id; do
            [ -z "$id" ] && continue
            if [ ! -f "reviews/$id.md" ]; then echo "https://youtu.be/$id" >> /tmp/urls.txt; fi
          done < /tmp/ids.txt
          echo "count=$(wc -l < /tmp/urls.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "To process:"; cat /tmp/urls.txt

      - name: Analyze each video
        if: steps.list.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAKE_CLIPS: ${{ github.event.inputs.make_clips }}
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "::group::$url"
            bash process_video.sh "$url"
            echo "::endgroup::"
          done < /tmp/urls.txt

      - name: Upload clips (if any)
        if: steps.list.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: channel-shorts-clips
          path: clips/*.mp4
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit reviews
        if: steps.list.outputs.count != '0'
        run: |
          git config user.name "Shubham Safaya"
          git config user.email "safayashubham@gmail.com"
          git add reviews/
          git diff --staged --quiet || { git commit -m "Channel batch: shorts plans ($(date -u +%F))"; git push; }
